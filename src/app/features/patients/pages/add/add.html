<div class="body">

  <div class="patient-card">
    <!-- HEADER with attractive gradient and icon -->
    <div class="form-header">
      <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem;">
        <div>
          <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
            <div
              style="background: rgba(255,255,255,0.2); border-radius: 999px; padding: 0.5rem; backdrop-filter: blur(4px);">
              <svg style="width: 1.5rem; height: 1.5rem; color: white;" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
              </svg>
            </div>
            <h2 style="color: white; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.01em;">
              {{ isEdit ? 'Update Patient' : 'Add New Patient' }} 
            </h2>
          </div>
          <p style="color: rgba(255,255,255,0.9); font-size: 0.875rem;">Fill accurate patient information for medical
            records</p>
        </div>
        <div
          style="background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); padding: 0.375rem 1rem; border-radius: 2rem;">
          <span style="color: white; font-size: 0.75rem; font-weight: 500;">✦ Required fields marked</span>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <form id="patientForm" class="form-body" [formGroup]="patientForm" (ngSubmit)="onSubmit()">
      <!-- Main Grid: 2 columns on tablet+ -->
      <div class="form-grid">

        <!-- Full Name -->
        <div class="input-group">
          <label class="input-label">
            <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #3b82f6;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            Full Name <span class="required-star">*</span>
          </label>
          <input type="text" id="fullName" class="form-input" placeholder="e.g., Emily Rodriguez" autocomplete="name"
            formControlName="fullName">
          <div class="error-message" id="fullNameError" style="display: none;">❌ Full name is required</div>
        </div>


        <!-- Phone -->
        <div class="input-group">
          <label class="input-label">
            <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #3b82f6;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
            Phone Number
          </label>
          <input type="tel" id="phone" class="form-input" placeholder="+1 (555) 000-9999" formControlName="phone">
        </div>
      </div>
      <!-- Address -->
      <div style="flex: 1;">
        <div style="font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase;">
          Address
        </div>

        <input type="text" class="form-input" placeholder="City, Street, Country" formControlName="address"
          style="margin-top: 0.25rem; padding: 0.5rem 0.75rem; font-size: 0.8rem;">
      </div>
      <!-- Extra medical info row (attractive addition) -->
      <div class="info-card"
        style="margin-top: 1.25rem; display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center;">
        <!-- Gender -->
        <div class="input-group">
          <label class="input-label">
            <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #3b82f6;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Gender
          </label>

          <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">

            <label style="display: flex; align-items: center; gap: 0.4rem;">
              <input type="radio" formControlName="gender" value="MALE">
              Male
            </label>

            <label style="display: flex; align-items: center; gap: 0.4rem;">
              <input type="radio" formControlName="gender" value="FEMALE">
              Female
            </label>

          </div>
        </div>
        <div style="flex: 1;">
          <div
            style="font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">
            Birth Date</div>
          <input type="date" id="emergencyContact" class="form-input"
            style="margin-top: 0.25rem; padding: 0.5rem 0.75rem; font-size: 0.8rem;"
            placeholder="Name & phone (optional)" formControlName="birthDate">
        </div>
        <div style="flex: 1;">
          <div
            style="font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">
            Watsapp number</div>
          <input type="text" id="emergencyContact" class="form-input"
            style="margin-top: 0.25rem; padding: 0.5rem 0.75rem; font-size: 0.8rem;"
            placeholder="Name & phone (optional)" formControlName="whatsappNumber">
        </div>
      </div>

      <!-- Validation alert placeholder -->
      <div id="validationAlert" class="validation-alert">
        <span>⚠️</span> <span id="alertMessage">Please fill all required fields before saving.</span>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button type="button" id="cancelBtn" class="btn-cancel" (click)="cancel()">
          <svg style="width: 1rem; height: 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
          Cancel
        </button>
        <button type="submit" id="submitBtn" class="btn-submit">
          <svg style="width: 1rem; height: 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
          </svg>
          {{ isEdit ? 'Update Patient' : 'Save Patient Record' }}
        </button>
        
      </div>
    </form>
  </div>


</div>
