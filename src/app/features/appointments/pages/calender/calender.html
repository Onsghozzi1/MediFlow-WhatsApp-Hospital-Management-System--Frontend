<div class="min-h-screen bg-gray-50 p-6">

	<!-- TOP BAR -->
	<div
		class="bg-white rounded-2xl shadow-sm border p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">

		<!-- LEFT ACTIONS -->
		<div class="flex items-center gap-2">

			<button mwlCalendarPreviousView [view]="view" [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200 transition font-medium">
				← Previous
			</button>

			<button mwlCalendarToday [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition font-medium">
				Today
			</button>

			<button mwlCalendarNextView [view]="view" [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200 transition font-medium">
				Next →
			</button>

		</div>

		<!-- CENTER TITLE -->
		<div class="text-lg font-semibold text-gray-700 text-center">
			{{ viewDate | calendarDate: view + 'ViewTitle' : 'en' }}
		</div>

		<!-- RIGHT VIEW SWITCH -->
		<div class="flex bg-gray-100 p-1 rounded-xl">

			<button (click)="setView(CalendarView.Month)" [class]="view === CalendarView.Month 
          ? 'bg-white shadow text-blue-600'
          : 'text-gray-600'" class="px-4 py-2 rounded-lg font-medium transition">
				Month
			</button>

			<button (click)="setView(CalendarView.Week)" [class]="view === CalendarView.Week 
          ? 'bg-white shadow text-blue-600'
          : 'text-gray-600'" class="px-4 py-2 rounded-lg font-medium transition">
				Week
			</button>

			<button (click)="setView(CalendarView.Day)" [class]="view === CalendarView.Day 
          ? 'bg-white shadow text-blue-600'
          : 'text-gray-600'" class="px-4 py-2 rounded-lg font-medium transition">
				Day
			</button>

		</div>

	</div>

	<!-- CALENDAR CONTAINER -->
	<div class="mt-6 bg-white rounded-2xl shadow-sm border p-4">

		<div class="rounded-xl overflow-hidden">

			@switch (view) {
			@case (CalendarView.Month) {
			<mwl-calendar-month-view [viewDate]="viewDate" [events]="events" />
			}

			@case (CalendarView.Week) {
			<mwl-calendar-week-view [viewDate]="viewDate" [events]="events" />
			}

			@case (CalendarView.Day) {
			<mwl-calendar-day-view [viewDate]="viewDate" [events]="events" />
			}
			}

		</div>

	</div>

</div>
