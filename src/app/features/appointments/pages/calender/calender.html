<div class="min-h-screen bg-gray-50 p-6">

	<!-- TOP BAR -->
	<div
		class="bg-white rounded-2xl shadow-sm border p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">

		<!-- LEFT -->
		<div class="flex items-center gap-2">

			<button mwlCalendarPreviousView [view]="view" [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200">
				← Previous
			</button>

			<button mwlCalendarToday [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">
				Today
			</button>

			<button mwlCalendarNextView [view]="view" [(viewDate)]="viewDate"
				class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200">
				Next →
			</button>

		</div>

		<!-- CENTER -->
		<div class="text-lg font-semibold text-gray-700">

			{{ viewDate | calendarDate:(view + 'ViewTitle'):'en' }}

		</div>

		<!-- RIGHT -->
		<div class="flex bg-gray-100 p-1 rounded-xl">

			<button (click)="setView(CalendarView.Month)" class="px-4 py-2 rounded-lg"
				[class.bg-white]="view === CalendarView.Month">
				Month
			</button>

			<button (click)="setView(CalendarView.Week)" class="px-4 py-2 rounded-lg"
				[class.bg-white]="view === CalendarView.Week">
				Week
			</button>

			<button (click)="setView(CalendarView.Day)" class="px-4 py-2 rounded-lg"
				[class.bg-white]="view === CalendarView.Day">
				Day
			</button>

		</div>

	</div>

	<!-- CALENDAR -->
	<div class="mt-6 bg-white rounded-2xl shadow-sm border p-4">

		@switch (view) {

		@case (CalendarView.Month) {


		<mwl-calendar-month-view [viewDate]="viewDate" [events]="events" [refresh]="refresh"
			(eventTimesChanged)="eventTimesChanged($event)">
		</mwl-calendar-month-view>

		}

		@case (CalendarView.Week) {

		<mwl-calendar-week-view [viewDate]="viewDate" [events]="events" [refresh]="refresh"
			(hourSegmentClicked)="hourSegmentClicked($event)" (eventTimesChanged)="eventTimesChanged($event)"
			(eventClicked)="handleEvent($event.event)">
		</mwl-calendar-week-view>

		}

		@case (CalendarView.Day) {
		<mwl-calendar-day-view [viewDate]="viewDate" [events]="events" [refresh]="refresh"
			(hourSegmentClicked)="hourSegmentClicked($event)" (eventTimesChanged)="eventTimesChanged($event)"
			(eventClicked)="handleEvent($event.event)">
		</mwl-calendar-day-view>

		}

		}

	</div>

</div>
